name: CI

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run unit tests
        run: uv run pytest tests/unit/ --cov=pikaia --cov-report=term-missing --cov-fail-under=95

  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Export base pyproject.toml
        run: git show origin/${{ github.base_ref }}:pyproject.toml > /tmp/base_pyproject.toml

      - name: Check version bump
        run: uv run --no-project --with packaging .github/scripts/check_version.py pyproject.toml /tmp/base_pyproject.toml
