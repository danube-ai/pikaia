name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest tests/unit/

  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install packaging
        run: uv pip install packaging

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Export base pyproject.toml
        run: git show origin/${{ github.base_ref }}:pyproject.toml > /tmp/base_pyproject.toml

      - name: Check version bump
        run: python .github/scripts/check_version.py pyproject.toml /tmp/base_pyproject.toml
